[xdebug]
; Mode 'off' secara default agar API Resource kamu kencang.
; Ubah ke 'debug' hanya saat ingin menelusuri baris kode.
xdebug.mode=off ;develop,debug ; [develop,coverage,debug,profile]

; Alamat IP host (komputer kamu). 'host.docker.internal' biasanya bekerja di Mac/Win.
; Untuk Linux, pastikan docker-compose punya 'extra_hosts'.
xdebug.client_host=host.docker.internal

; Port standar Xdebug 3
xdebug.client_port=9003

; Otomatis start debugging saat ada request (sangat memudahkan)
xdebug.start_with_request=yes

; Log untuk membantu jika Xdebug tidak mau konek ke VSCode/PhpStorm
;xdebug.log_level=0

; Batasi kedalaman variabel agar tidak memakan memori besar saat var_dump
xdebug.var_display_max_depth=3
xdebug.var_display_max_data=512

xdebug.discover_client_host=1
xdebug.idekey=docker
xdebug.log=/tmp/xdebug.log
