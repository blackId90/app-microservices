[databases]
db_multi_tenant_auth = host=postgres-local port=5432 dbname=db_multi_tenant_auth user=root password=root
db_multi_tenant_control_tenant = host=postgres-local port=5432 dbname=db_multi_tenant_control_tenant user=root password=root
db_tenant = host=postgres-local port=5432 dbname=db_multi_tenant_dev user=root password=root

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
admin_users = root
pool_mode = transaction
max_client_conn = 500
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5

server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits

log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

server_idle_timeout = 30
server_connect_timeout = 5
server_login_retry = 5
